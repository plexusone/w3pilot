name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Specific script to run (optional)'
        required: false
        type: string

env:
  W3PILOT_HEADLESS: "1"
  W3PILOT_DEBUG: "0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Install Chrome Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2

      - name: Install Clicker Binary
        run: |
          git clone --depth 1 https://github.com/VibiumDev/vibium.git /tmp/vibium
          cd /tmp/vibium/clicker/cmd/clicker
          touch SKILL.md  # Required for go:embed
          go build -o $HOME/go/bin/clicker .
          rm -rf /tmp/vibium

      - name: Cache Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/vibium
          key: vibium-browser-${{ runner.os }}

      - name: Ensure Browser Installed
        run: |
          clicker install
          clicker paths

      - name: Build CLI
        run: go build -o w3pilot ./cmd/w3pilot

      - name: Run specific script
        if: ${{ github.event.inputs.script != '' }}
        run: ./w3pilot run ${{ github.event.inputs.script }} --headless

      - name: Run all E2E tests
        if: ${{ github.event.inputs.script == '' }}
        run: |
          for dir in tests/e2e/*/; do
            if [ -d "$dir" ]; then
              for script in "$dir"*.json; do
                if [ -f "$script" ]; then
                  echo "Running: $script"
                  ./w3pilot run "$script" --headless
                fi
              done
            fi
          done

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots
          path: |
            *.png
            screenshots/
          retention-days: 7
