name: Go Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-integration.yaml'
    # Also run on version tags (pre-release gate)
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-integration.yaml'
  # Nightly run to catch environment drift and flaky tests
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

env:
  W3PILOT_HEADLESS: "1"
  W3PILOT_DEBUG: "0"

jobs:
  unit-tests:
    name: Unit Tests (Protocol Contract)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Unit Tests
        run: go test -v -race ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Install Clicker Binary
        run: |
          git clone --depth 1 https://github.com/VibiumDev/vibium.git /tmp/vibium
          cd /tmp/vibium/clicker/cmd/clicker
          touch SKILL.md  # Required for go:embed
          go build -o $HOME/go/bin/clicker .
          rm -rf /tmp/vibium

      - name: Verify Chrome
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          ${{ steps.setup-chrome.outputs.chrome-path }} --version
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run Smoke Tests
        run: go test -tags=integration -v -timeout=2m ./integration/... -run 'TestSmoke'
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run Full Integration Tests
        run: go test -tags=integration -v -timeout=10m ./integration/...
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-screenshots
          path: |
            *.png
            screenshots/
          retention-days: 7
