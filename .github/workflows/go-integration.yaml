name: Go Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-integration.yaml'
    # Also run on version tags (pre-release gate)
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-integration.yaml'
  # Nightly run to catch environment drift and flaky tests
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

env:
  W3PILOT_HEADLESS: "1"
  W3PILOT_DEBUG: "0"

jobs:
  unit-tests:
    name: Unit Tests (Protocol Contract)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Unit Tests
        run: go test -v -race ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Chrome Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2

      - name: Install Clicker Binary
        run: |
          git clone --depth 1 https://github.com/VibiumDev/vibium.git /tmp/vibium
          cd /tmp/vibium/clicker/cmd/clicker
          touch SKILL.md  # Required for go:embed
          go build -o $HOME/go/bin/clicker .
          rm -rf /tmp/vibium

      - name: Cache Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/vibium
          key: vibium-browser-${{ runner.os }}

      - name: Ensure Browser Installed
        run: |
          clicker install
          clicker paths

      - name: Run Smoke Tests
        run: go test -tags=integration -v -timeout=2m ./integration/... -run 'TestSmoke'

      - name: Run Full Integration Tests
        run: go test -tags=integration -v -timeout=10m ./integration/...

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-screenshots
          path: |
            *.png
            screenshots/
          retention-days: 7
